<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #111;
    }
    .header {
      background: linear-gradient(135deg, #7C3AED 0%, #2563EB 100%);
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: 0.65; margin-top: 4px; }
    .content { padding: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      color: #111;
      margin-bottom: 16px;
      appearance: none;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #7C3AED; }
    .info {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 14px;
      font-size: 12px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #f0faf0;
      border-radius: 8px;
      font-size: 13px;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }
    .status.error {
      background: #fff3f3;
      color: #c62828;
      border-color: #ffcdd2;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
    }
    .dot.error { background: #f44336; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📄 Bridge Summarizer</h1>
    <p>ASEAN Government Website Summarizer</p>
  </div>

  <div class="content">
    <label for="targetLang">Summary Language</label>
    <select id="targetLang">
      <option value="en">English</option>
      <option value="ms">Malay</option>
      <option value="id">Indonesian</option>
      <option value="vi">Vietnamese</option>
      <option value="th">Thai</option>
      <option value="zh-cn">Chinese (Simplified)</option>
      <option value="zh-tw">Chinese (Traditional)</option>
      <option value="ta">Tamil</option>
      <option value="tl">Tagalog / Filipino</option>
      <option value="my">Burmese / Myanmar</option>
      <option value="km">Khmer</option>
      <option value="lo">Lao</option>
    </select>

    <div class="info">
      Automatically detects ASEAN government websites and shows a floating
      <strong>Summarise This Page</strong> button. Crawls 3 sublinks for a
      comprehensive summary in simple language.
    </div>

    <div id="status" class="status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Checking server…</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
